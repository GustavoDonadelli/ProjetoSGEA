<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchForm('login')">Entrar</button>
            <button class="auth-tab" onclick="switchForm('register')">Cadastrar</button>
        </div>

        <div class="auth-content">
            <!-- Formulário de Login -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">Entrar</button>

                <div class="links">
                    <a href="#">Esqueceu a senha?</a>
                </div>
            </form>

            <!-- Formulário de Cadastro -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-success">Criar Conta</button>
            </form>
        </div>
    </div>

    <script>
        function switchForm(formType) {
            // Atualizar abas
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[onclick="switchForm('${formType}')"]`).classList.add('active');

            // Atualizar formulários
            document.querySelectorAll('.auth-form').forEach(form => {
                form.classList.remove('active');
            });
            document.getElementById(`${formType}Form`).classList.add('active');
        }
    </script>
</body>
</html>
